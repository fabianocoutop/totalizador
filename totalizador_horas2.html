<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>Ticket Metrics</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link href="style.css" rel="stylesheet">
</head>

<body>

  <!-- LOADING OVERLAY -->
  <div class="loading-overlay" id="loading-overlay" style="display:none;">
    <div class="spinner"></div>
  </div>

  <!-- ==================== AUTH SCREEN ==================== -->
  <div class="auth-screen" id="auth-screen">
    <div class="auth-box">
      <h2><i class="bi bi-clock-history"></i> Ticket Metrics</h2>
      <p class="subtitle">Registre e gerencie o tempo dedicado aos seus projetos</p>

      <div class="auth-tabs">
        <button id="auth-tab-login" class="active" onclick="showAuthTab('login')">Entrar</button>
        <button id="auth-tab-register" onclick="showAuthTab('register')">Criar Conta</button>
      </div>

      <div id="auth-error" class="auth-error"></div>

      <!-- Login Form -->
      <div id="auth-form-login" class="auth-form active">
        <div class="mb-3">
          <label class="form-label" for="login-email">Email</label>
          <input type="email" id="login-email" class="form-control" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="mb-3">
          <label class="form-label" for="login-password">Senha</label>
          <input type="password" id="login-password" class="form-control" placeholder="Sua senha"
            autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        </div>
        <button class="btn-primary-custom w-100" onclick="doLogin()">
          <i class="bi bi-box-arrow-in-right"></i> Entrar
        </button>
      </div>

      <!-- Register Form -->
      <div id="auth-form-register" class="auth-form">
        <div class="mb-3">
          <label class="form-label" for="reg-nome">Nome completo</label>
          <input type="text" id="reg-nome" class="form-control" placeholder="Seu nome" autocomplete="name">
        </div>
        <div class="mb-3">
          <label class="form-label" for="reg-email">Email</label>
          <input type="email" id="reg-email" class="form-control" placeholder="seu@email.com" autocomplete="email">
        </div>
        <div class="mb-3">
          <label class="form-label" for="reg-password">Senha</label>
          <input type="password" id="reg-password" class="form-control" placeholder="Mínimo 6 caracteres"
            autocomplete="new-password" onkeydown="if(event.key==='Enter')doRegister()">
        </div>
        <button class="btn-primary-custom w-100" onclick="doRegister()">
          <i class="bi bi-person-plus"></i> Criar Conta
        </button>
      </div>
    </div>
  </div>

  <!-- ==================== APP SCREEN ==================== -->
  <div id="app-screen" style="display:none;">

    <!-- HEADER -->
    <div class="app-header">
      <h1><i class="bi bi-clock-history"></i> Ticket Metrics</h1>
      <div class="user-bar">
        <span><i class="bi bi-person-circle"></i> <span id="user-name"></span></span>
        <button onclick="doLogout()"><i class="bi bi-box-arrow-right"></i> Sair</button>
      </div>
    </div>

    <div class="container" style="max-width: 700px;">

      <!-- TABS -->
      <div class="nav-tabs-custom">
        <button id="tab-form" onclick="showTab('form')">
          <i class="bi bi-plus-circle"></i> Novo Registro
        </button>
        <button id="tab-history" onclick="showTab('history')">
          <i class="bi bi-clock-history"></i> Histórico
        </button>
        <button id="tab-cadastros" onclick="showTab('cadastros')">
          <i class="bi bi-gear"></i> Cadastros
        </button>
      </div>

      <!-- ========== FORM PANEL ========== -->
      <div id="form-panel" class="panel">

        <div class="card-custom">
          <div class="section-title"><i class="bi bi-briefcase"></i> Informações do Registro</div>
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label" for="campo-projeto">Projeto</label>
              <select id="campo-projeto" class="form-select">
                <option value="">-- Selecione um projeto --</option>
              </select>
            </div>
            <div class="col-sm-4">
              <label class="form-label" for="campo-data">Data</label>
              <input type="date" id="campo-data" class="form-control">
            </div>
            <div class="col-sm-4">
              <label class="form-label" for="campo-ticket">Ticket <small
                  style="opacity:0.5;text-transform:none;">(opcional)</small></label>
              <input type="text" id="campo-ticket" class="form-control" placeholder="Ex: #12345" autocomplete="off">
            </div>
            <div class="col-12" style="margin-top: 4px;">
              <label class="form-label" for="campo-descricao">Descrição</label>
              <textarea id="campo-descricao" class="form-control" placeholder="Descreva o que foi feito..."
                rows="3"></textarea>
            </div>
          </div>
        </div>

        <!-- Intervalos -->
        <div class="card-custom">
          <div class="section-title"><i class="bi bi-stopwatch"></i> Intervalos de Tempo</div>
          <div id="intervalos"></div>
          <button class="btn-sm-icon add" onclick="adicionarIntervalo()" title="Adicionar intervalo"
            style="margin-top:4px;">
            <i class="bi bi-plus-lg"></i>
          </button>
        </div>

        <!-- Total -->
        <div class="total-display mb-3">
          <div class="label">Total de Horas</div>
          <div class="value" id="total">00:00</div>
        </div>

        <!-- Action Buttons -->
        <div class="d-flex gap-2 mb-4 flex-wrap">
          <button class="btn-primary-custom flex-fill" onclick="salvarRegistro()">
            <i class="bi bi-check-lg"></i> Salvar Registro
          </button>
          <button class="btn-outline-custom" onclick="resetFormulario()">
            <i class="bi bi-arrow-counterclockwise"></i> Reset
          </button>
        </div>
      </div>

      <!-- ========== HISTORY PANEL ========== -->
      <div id="history-panel" class="panel">
        <div class="card-custom">
          <div class="section-title"><i class="bi bi-funnel"></i> Filtros</div>
          <div class="filters-row">
            <input type="date" id="filtro-data-de" class="form-control" title="Data inicial">
            <input type="date" id="filtro-data-ate" class="form-control" title="Data final">
            <select id="filtro-projeto-hist" class="form-select">
              <option value="">Todos os projetos</option>
            </select>
          </div>
          <div class="filters-row">
            <input type="text" id="filtro-ticket" class="form-control" placeholder="Buscar ticket..." autocomplete="off"
              style="max-width:160px;">
            <select id="filtro-status" class="form-select" style="max-width:170px;">
              <option value="todos">Todos</option>
              <option value="nao">Não apontados</option>
              <option value="sim">Apontados</option>
            </select>
          </div>
          <div class="d-flex justify-content-between align-items-center">
            <small class="text-muted" id="history-count"></small>
            <button class="btn-danger-custom" onclick="limparFiltros()" style="padding:6px 14px;font-size:0.8rem;">
              <i class="bi bi-x-lg"></i> Limpar
            </button>
          </div>
          <div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--border);">
            <button class="btn-export" onclick="exportarDados()">
              <i class="bi bi-download"></i> Exportar JSON
            </button>
          </div>
        </div>
        <div id="history-list"></div>
      </div>

      <!-- ========== CADASTROS PANEL ========== -->
      <div id="cadastros-panel" class="panel">

        <!-- Empresas -->
        <div class="card-custom cadastro-section">
          <div class="section-title"><i class="bi bi-building"></i> Empresas</div>
          <div class="cadastro-add-row">
            <input type="text" id="nova-empresa" class="form-control" placeholder="Nome da empresa..."
              autocomplete="off" onkeydown="if(event.key==='Enter')addEmpresa()">
            <button class="btn-primary-custom" onclick="addEmpresa()" style="white-space:nowrap;">
              <i class="bi bi-plus-lg"></i> Adicionar
            </button>
          </div>
          <div id="empresas-list"></div>
        </div>

        <!-- Projetos -->
        <div class="card-custom cadastro-section">
          <div class="section-title"><i class="bi bi-folder"></i> Projetos</div>
          <div class="cadastro-add-row">
            <input type="text" id="novo-projeto" class="form-control" placeholder="Nome do projeto..."
              autocomplete="off" onkeydown="if(event.key==='Enter')addProjeto()">
            <select id="projeto-empresa-sel" class="form-select" style="max-width:180px;">
              <option value="">Sem empresa</option>
            </select>
            <button class="btn-primary-custom" onclick="addProjeto()" style="white-space:nowrap;">
              <i class="bi bi-plus-lg"></i> Adicionar
            </button>
          </div>
          <div id="projetos-list"></div>
        </div>

      </div>

    </div>
  </div>

  <!-- TOAST -->
  <div class="toast-custom" id="toast"></div>

  <!-- SCRIPTS -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>

</body>

</html>
